<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSA Project - Login</title>
  <style>
    :root {
      --primary-color: #0997f5;
      --bg-color: #ffffff;
      --card-bg: #181818;
      --text-color: #ffffff;
      --input-bg: #786e6e;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-container {
      background-color: var(--card-bg);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .logo {
      font-size: 2rem;
      font-weight: bold;
      color: var(--primary-color);
      margin-bottom: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: #b3b3b3;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 4px;
      border: 1px solid transparent;
      background-color: var(--input-bg);
      color: white;
      font-size: 1rem;
      box-sizing: border-box;
      transition: border 0.3s;
    }

    input:focus {
      outline: none;
      border: 1px solid var(--primary-color);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background-color: var(--primary-color);
      border: none;
      border-radius: 50px;
      color: black;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.2s, background-color 0.2s;
    }

    .btn-login:hover {
      background-color: #0997f5;
      transform: scale(1.02);
    }

    .footer-links {
      margin-top: 25px;
      font-size: 0.85rem;
      color: #b3b3b3;
    }

    .footer-links a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }

    #message {
      margin-top: 15px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="logo">
    <span>🧠</span> Sigma shop
  </div>
  <h1>Inicia sesión para continuar</h1>

  <div class="form-group">
    <label for="usuario">Usuario</label>
    <input type="text" id="Usuario" placeholder="Nombre de usuario">
  </div>

  <div class="form-group">
    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>

  <button class="btn-login" onclick="handleLogin()">ENTRAR</button>

  <div id="message"></div>

  <div class="footer-links">
    ¿No tienes cuenta? <a href="#">Regístrate</a>
  </div>
</div>

<script>
  async function handleLogin() {
    const user = document.getElementById('usuario').value;
    const password = document.getElementById('password').value;
    const messageDiv = document.getElementById('message');

    // Este es el objeto que espera tu Swagger según la imagen
    const loginData = {
      user: usuario,
      password: password
    };

    try {
      // Cambia la URL por la de tu servidor local
      const response = await fetch('http://localhost:8080/dsaApp/auth/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(loginData)
      });

      if (response.ok) {
        messageDiv.style.color = "#0997f5";
        messageDiv.innerText = "¡Login exitoso! Redirigiendo...";
        // Aquí podrías redirigir a otra página:
           window.location.href = "http://localhost:8080/swagger/index.html";
      } else {
        messageDiv.style.color = "#ff4444";
        messageDiv.innerText = "Error: Usuario o contraseña incorrectos.";
      }
    } catch (error) {
      messageDiv.style.color = "#ff4444";
      messageDiv.innerText = "Error de conexión con el servidor.";
      console.error(error);
    }
  }
</script>
</body>
</html>
