<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo SIGMA | Login</title>
    <link rel="stylesheet" href="css/sigma-auth.css">
</head>
<body class="sigma-body login-only">
<div class="screen-grid" aria-hidden="true"></div>
<div class="scanline" aria-hidden="true"></div>

<main class="sigma-shell single-shell">
    <section class="access-panel" aria-labelledby="loginTitle">
        <div class="panel-status">
            <span class="status-light"></span>
            NODO DE ACCESO EETAC
        </div>

        <header class="access-header">
            <p class="eyebrow">Sistema restringido UPC</p>
            <h1 id="loginTitle">PROTOCOLO SIGMA</h1>
            <p class="subtitle">Identificación requerida para continuar</p>
        </header>

        <div class="terminal-lines" aria-hidden="true">
            <span>&gt; canal seguro activo</span>
            <span>&gt; esperando credenciales de agente</span>
            <span>&gt; destino: sigma.shop</span>
        </div>

        <!-- FORMULARIO CORREGIDO (Sin onclick, usa submit) -->
        <form id="loginFormDedicado" class="auth-form">
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" name="usuario" placeholder="Nombre de usuario" autocomplete="username" required>

            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="Clave de acceso" autocomplete="current-password" required>

            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <div id="message" class="message" aria-live="polite"></div>

        <p class="footer-links">
            ¿No tienes cuenta? <a href="index.html">Solicita registro SIGMA</a>
        </p>
    </section>
</main>

<script src="js/sigma-login.js"></script>
</body>
</html>
